openapi: 3.1.0
info:
    title: SIMRS API
    version: 1.0.0
servers:
    - url: http://localhost:8000
paths:
    /api/auth/login:
        post:
            tags:
                - Authentikasi
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - username
                                - password
                            properties:
                                username:
                                    type: string
                                    example: "user1"
                                password:
                                    type: string
                                    example: "password"
                                force_logout:
                                    type: boolean
                                    example: false
            responses:
                200:
                    description: Login sukses
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: true
                                    status:
                                        type: integer
                                        example: 200
                                    message:
                                        type: string
                                        example: "Login berhasil"
                                    data:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                user:
                                                    type: object
                                                    properties:
                                                        username:
                                                            type: string
                                                            example: "user1"
                                                        nama:
                                                            type: string
                                                            example: "User 1"
                                                        jabatan:
                                                            type: string
                                                            example: "pengadministrasi pendaftaran"
                                                        role:
                                                            type: string
                                                            example: "pengadministrasi"
                                                token:
                                                    type: string
                                                    example: "Bearer 018d451c000077a088002f3b7c7d9a10"
                                                permissions:
                                                    type: array
                                                    items:
                                                        type: string
                                                        example: "create-pasien"
                400:
                    description: Validasi gagal
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: false
                                    status:
                                        type: integer
                                        example: 400
                                    message:
                                        type: string
                                        example: "Validasi gagal"
                                    errors:
                                        type: object
                                        properties:
                                            username:
                                                type: array
                                                items:
                                                    type: string
                                                    example: "Username tidak boleh kosong"
                                            password:
                                                type: array
                                                items:
                                                    type: string
                                                    example: "Password tidak boleh kosong"
                401:
                    description: Tidak terautentikasi
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: false
                                    status:
                                        type: integer
                                        example: 401
                                    message:
                                        type: string
                                        example: "Username dan password tidak valid"
                409:
                    description: Terjadi konflik
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: false
                                    status:
                                        type: integer
                                        example: 409
                                    message:
                                        type: string
                                        example: "Akun sedang aktif di perangkat lain. Lanjutkan login dan keluarkan perangkat lain?"
                422:
                    description: Tidak dapat diproses
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: false
                                    status:
                                        type: integer
                                        example: 422
                                    message:
                                        type: string
                                        example: "Login dibatalkan"
                429:
                    description: Terlalu banyak permintaan
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: false
                                    status:
                                        type: integer
                                        example: 429
                                    message:
                                        type: string
                                        example: "Terlalu banyak upaya login, silakan coba lagi dalam 30 detik"
    /api/auth/logout:
        delete:
            tags:
                - Authentikasi
            security:
                - XTokenAuth: []
            responses:
                200:
                    description: Success
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: true
                                    status:
                                        type: integer
                                        example: 200
                                    message:
                                        type: string
                                        example: "Logout berhasil"
                401:
                    description: Tidak terautentikasi
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: false
                                    status:
                                        type: integer
                                        example: 401
                                    message:
                                        type: string
                                        example: "Token tidak valid atau kadaluwarsa"


